{% set version = "2.3-1" %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-labdsv
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/labdsv_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/labdsv/labdsv_{{ version }}.tar.gz
  sha256: e2880a3e9406061f4f57322102817fa6ce3c045b94d5ec3e2751b05ebb45dfff

build:
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ compiler('c') }}              # [not win]
    - {{ stdlib("c") }}                # [not win]
    - {{ compiler('m2w64_c') }}        # [win]
    - {{ stdlib("m2w64_c") }}          # [win]
    - {{ compiler('fortran') }}        # [not win]
    - {{ compiler('m2w64_fortran') }}  # [win]
    - {{ posix }}filesystem        # [win]
    - {{ posix }}make
    - {{ posix }}sed               # [win]
    - {{ posix }}coreutils         # [win]
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
    - r-mass                       # [build_platform != target_platform]
    - r-rtsne                      # [build_platform != target_platform]
    - r-cluster                    # [build_platform != target_platform]
    - r-mgcv                       # [build_platform != target_platform]
  host:
    - r-base
    - r-mass
    - r-rtsne
    - r-cluster
    - r-mgcv
  run:
    - r-base
    - r-mass
    - r-rtsne
    - r-cluster
    - r-mgcv

test:
  commands:
    - $R -e "library('labdsv')"           # [not win]
    - "\"%R%\" -e \"library('labdsv')\""  # [win]

about:
  home: https://cran.r-project.org/package=labdsv
  license: GPL-2.0-or-later
  summary: A variety of ordination and community analyses useful in analysis of data sets in community ecology.   Includes many of the common ordination methods, with  graphical routines to facilitate their interpretation,  as well as several novel analyses.
  license_family: GPL2
  license_file:
    - {{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-2

extra:
  recipe-maintainers:
    - conda-forge/r
    - nsoranzo
